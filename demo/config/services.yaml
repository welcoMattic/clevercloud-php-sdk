# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Clever Cloud SDK wiring.
    # The factory reads consumer credentials from env vars and the user
    # token / secret from the session (populated by SecurityController after
    # the OAuth 1.0a 3-legged flow).
    App\Service\ClevercloudClientFactory:
        arguments:
            $consumerKey: '%env(CC_CONSUMER_KEY)%'
            $consumerSecret: '%env(CC_CONSUMER_SECRET)%'

    # Client built lazily — only instantiated when a controller actually
    # touches it, by which point the session is populated.
    CleverCloud\Sdk\Client:
        factory: ['@App\Service\ClevercloudClientFactory', 'create']
        lazy: true

    # PSR-18 / PSR-17 aliases pointing at Symfony's HTTP client so the
    # OAuth flow helper picks them up via autowiring. We disable autowire on
    # Psr18Client itself because its constructor takes interfaces that we've
    # aliased back to it (circular otherwise).
    Symfony\Component\HttpClient\Psr18Client:
        autowire: false
    Psr\Http\Client\ClientInterface: '@Symfony\Component\HttpClient\Psr18Client'
    Psr\Http\Message\RequestFactoryInterface: '@Symfony\Component\HttpClient\Psr18Client'
    Psr\Http\Message\StreamFactoryInterface: '@Symfony\Component\HttpClient\Psr18Client'
    Psr\Http\Message\UriFactoryInterface: '@Symfony\Component\HttpClient\Psr18Client'

    # OAuth signer + flow helper used by SecurityController for /login.
    CleverCloud\Sdk\Auth\OAuth1Signer: ~
    CleverCloud\Sdk\Configuration: ~
    CleverCloud\Sdk\Auth\OAuthFlow: ~
