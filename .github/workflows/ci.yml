name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    name: QA (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Coding standards
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: vendor/bin/phpunit --colors=always

  integration:
    name: Integration (live API)
    runs-on: ubuntu-latest
    needs: qa
    # Only runs when CC_API_TOKEN is configured on the repo.
    # Forks / branches without the secret skip cleanly.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check secret is wired
        id: gate
        env:
          CC_API_TOKEN: ${{ secrets.CC_API_TOKEN }}
        run: |
          if [ -z "${CC_API_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "CC_API_TOKEN secret not configured; skipping integration job."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up PHP
        if: steps.gate.outputs.configured == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install dependencies
        if: steps.gate.outputs.configured == 'true'
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run smoke-self
        if: steps.gate.outputs.configured == 'true'
        env:
          CC_API_TOKEN: ${{ secrets.CC_API_TOKEN }}
        run: php examples/smoke-self.php

      - name: Run integration test suite
        if: steps.gate.outputs.configured == 'true'
        env:
          CC_API_TOKEN: ${{ secrets.CC_API_TOKEN }}
          CC_ORG_ID: ${{ secrets.CC_ORG_ID }}
          CC_APP_ID: ${{ secrets.CC_APP_ID }}
        run: vendor/bin/phpunit --testsuite integration --colors=always
