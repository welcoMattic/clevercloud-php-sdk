name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    name: QA (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Coding standards
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: vendor/bin/phpunit --colors=always

  smoke:
    name: Smoke (live API)
    runs-on: ubuntu-latest
    needs: qa
    # Only runs when the four CC_* secrets are configured on the repo.
    # Forks / branches without secrets skip cleanly.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are wired
        id: gate
        env:
          CC_CONSUMER_KEY: ${{ secrets.CC_CONSUMER_KEY }}
        run: |
          if [ -z "${CC_CONSUMER_KEY}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "CC_* secrets not configured; skipping smoke job."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up PHP
        if: steps.gate.outputs.configured == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install dependencies
        if: steps.gate.outputs.configured == 'true'
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run smoke-self
        if: steps.gate.outputs.configured == 'true'
        env:
          CC_CONSUMER_KEY: ${{ secrets.CC_CONSUMER_KEY }}
          CC_CONSUMER_SECRET: ${{ secrets.CC_CONSUMER_SECRET }}
          CC_TOKEN: ${{ secrets.CC_TOKEN }}
          CC_TOKEN_SECRET: ${{ secrets.CC_TOKEN_SECRET }}
        run: php examples/smoke-self.php
